base_model: Qwen/Qwen3-32B
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer
trust_remote_code: true

load_in_8bit: false
load_in_4bit: true
strict: false

datasets:
  - path: data/processed/sft_train.jsonl
    type: chat_template
    field_messages: messages
dataset_prepared_path: data/cache/axolotl/qwen3_32b_npc
val_set_size: 0.0
test_datasets:
  - path: data/processed/sft_validation.jsonl
    type: chat_template
    field_messages: messages

output_dir: outputs/sft/qwen3_32b_npc_qlora
adapter: qlora
sequence_len: 4096
sample_packing: true
pad_to_sequence_len: true

lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_linear: true

wandb_project: game-npc-llm
wandb_name: qwen3-32b-npc-qlora

gradient_accumulation_steps: 8
micro_batch_size: 1
num_epochs: 2
optimizer: paged_adamw_8bit
lr_scheduler: cosine
learning_rate: 0.0002
warmup_ratio: 0.03
weight_decay: 0.0

bf16: auto
tf32: true
gradient_checkpointing: true
flash_attention: true

logging_steps: 10
eval_steps: 250
save_steps: 250
save_total_limit: 3
special_tokens:
  pad_token: <|endoftext|>
