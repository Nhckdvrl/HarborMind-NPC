base_model: Qwen/Qwen3-8B
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer
trust_remote_code: true

load_in_8bit: false
load_in_4bit: true
strict: false

datasets:
  - path: data/processed/sft_train.jsonl
    type: chat_template
    field_messages: messages
dataset_prepared_path: data/cache/axolotl/qwen3_8b_npc_smoke
val_set_size: 0.0
test_datasets:
  - path: data/processed/sft_validation.jsonl
    type: chat_template
    field_messages: messages

output_dir: outputs/sft/qwen3_8b_npc_qlora_smoke
adapter: qlora
sequence_len: 2048
sample_packing: false
pad_to_sequence_len: true

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_linear: true

gradient_accumulation_steps: 1
micro_batch_size: 1
max_steps: 20
optimizer: paged_adamw_8bit
lr_scheduler: cosine
learning_rate: 0.0002
warmup_steps: 2

bf16: auto
tf32: true
gradient_checkpointing: true
flash_attention: true

logging_steps: 1
eval_steps: 10
save_steps: 10
save_total_limit: 1
special_tokens:
  pad_token: <|endoftext|>
