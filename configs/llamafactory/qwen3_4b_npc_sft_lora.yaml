### model
model_name_or_path: /tmp/xiang/llm_models/qwen3_4b
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset
dataset_dir: data
dataset: game_npc_sft
eval_dataset: game_npc_sft_valid
template: qwen3_nothink
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 4
dataloader_num_workers: 0
packing: false

### output
output_dir: outputs/sft/qwen3_4b_npc_lora
logging_steps: 10
save_steps: 200
save_total_limit: 2
plot_loss: true
overwrite_output_dir: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
optim: paged_adamw_8bit
bf16: true
tf32: true
gradient_checkpointing: true
ddp_timeout: 180000000

### eval
do_eval: true
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 200
