[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "game-npc-llm"
version = "0.1.0"
description = "Post-training pipeline for game NPC LLMs using LIGHT and NPC-Dialogue_v2."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
  "datasets>=2.18.0",
  "huggingface-hub>=0.23.0",
  "httpx>=0.27.0",
  "jsonschema>=4.21.0",
  "numpy>=1.24.0",
  "openai>=1.30.0",
  "pydantic>=2.6.0",
  "pyyaml>=6.0.1",
  "rich>=13.7.0",
  "tqdm>=4.66.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-cov>=5.0.0",
  "ruff>=0.4.0",
]
train = [
  "accelerate>=0.30.0",
  "axolotl>=0.4.0",
  "bitsandbytes>=0.43.0",
  "peft>=0.11.0",
  "transformers>=4.41.0",
  "trl>=0.9.0",
]
serve = [
  "fastapi>=0.111.0",
  "langgraph>=0.1.0",
  "uvicorn>=0.30.0",
  "vllm>=0.5.0",
]
eval = [
  "lm-eval>=0.4.4",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
